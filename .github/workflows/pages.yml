name: Publish earnings model

on:
  push:
    branches: [main]
    paths:
      - "data/quant_audit/**"
      - "data/primary/**"
      - "src/**"
      - "scripts/**"
      - "site/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/pages.yml"
  schedule:
    - cron: "15 1 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deterministic Python environment
        run: |
          uv sync --frozen
      - name: Fetch primary SEC facts and build static API
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT || format('Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/131 Safari/537.36 {0}', github.repository) }}
        run: uv run python scripts/build_primary_api.py
      - name: Build same-period model snapshot
        run: uv run python scripts/build_model_snapshot.py
      - name: Run generated data contract tests
        run: uv run python -m pytest -q
      - name: Recalculate LangGraph audit
        run: uv run python scripts/run_quant_audit.py data/quant_audit/semiconductor_latest.json --output site/public/data/quant-audit.json
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Build Astro site
        working-directory: site
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          SITE_BASE: ${{ vars.SITE_BASE }}
        run: |
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
