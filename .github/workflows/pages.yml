name: Publish earnings model

on:
  push:
    branches: [main]
    paths:
      - "data/quant_audit/**"
      - "src/**"
      - "scripts/**"
      - "site/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/pages.yml"
  schedule:
    - cron: "15 1 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Recalculate model data
        run: |
          set -euo pipefail
          snapshot="$(find data/quant_audit -maxdepth 1 -type f -name 'semiconductor_*.json' | sort | tail -n 1)"
          test -n "$snapshot"
          uv sync --frozen
          uv run python scripts/run_quant_audit.py "$snapshot" --output site/public/data/quant-audit.json
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Build Astro site
        working-directory: site
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          SITE_BASE: ${{ vars.SITE_BASE }}
        run: |
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
