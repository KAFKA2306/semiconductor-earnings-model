name: Publish earnings model

on:
  push:
    branches: [main]
    paths:
      - "data/quant_audit/**"
      - "data/primary/**"
      - "src/**"
      - "scripts/**"
      - "site/**"
      - "README.md"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/pages.yml"
  schedule:
    - cron: "15 1 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deterministic Python environment
        run: |
          uv sync --frozen
      - name: Fetch primary SEC facts and build static API
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
        run: uv run python scripts/build_primary_api.py
      - name: Fetch direct semiconductor profit facts
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
        run: uv run python scripts/build_semiconductor_profit_api.py
      - name: Fetch normalized demand-side facts
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
        run: uv run python scripts/build_demand_api.py
      - name: Build same-period model snapshot
        run: uv run python scripts/build_model_snapshot.py
      - name: Run generated data contract tests
        run: uv run python -m pytest -q
      - name: Recalculate LangGraph audit
        run: uv run python scripts/run_quant_audit.py data/quant_audit/semiconductor_latest.json --output site/public/data/quant-audit.json
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Build Astro site
        working-directory: site
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          PUBLIC_BUILD_SHA: ${{ github.sha }}
        run: |
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify public Pages and APIs
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          EXPECTED_BUILD_SHA: ${{ github.sha }}
        run: |
          test -n "$PAGE_URL"
          base="${PAGE_URL%/}"
          test "$(curl -fsS -o /dev/null -w '%{http_code}' "$base/earnings/")" = "200"
          test "$(curl -fsS -o /dev/null -w '%{http_code}' "$base/model/")" = "200"
          test "$(curl -fsS -o /dev/null -w '%{http_code}' "$base/api/v1/index.json")" = "200"
          test "$(curl -fsS -o /dev/null -w '%{http_code}' "$base/api/v1/semiconductor-profit/index.json")" = "200"
          test "$(curl -fsS -o /dev/null -w '%{http_code}' "$base/api/v1/demand/index.json")" = "200"
          test "$(curl -fsS -o /dev/null -w '%{http_code}' "$base/data/quant-audit.json")" = "200"
          html="$(curl -fsSL "$base/earnings/")"
          audit_json="$(curl -fsSL "$base/data/quant-audit.json")"
          snapshot_hash="$(jq -er '.snapshot_hash' <<< "$audit_json")"
          grep -Fq "高い半導体利益成長は、" <<< "$html"
          grep -Fq "現在の判定" <<< "$html"
          grep -Fq "総括済み" <<< "$html"
          grep -Fq 'data-aggregation-status="computed"' <<< "$html"
          grep -Fq "因果成立ではありません" <<< "$html"
          grep -Fq "判定までの、" <<< "$html"
          grep -Fq "会社別の原fact。" <<< "$html"
          grep -Fq "半導体企業の" <<< "$html"
          grep -Fq "内部資金と" <<< "$html"
          grep -Fq "リース・借入" <<< "$html"
          grep -Fq "TIME VIEW / OBSERVED PROFIT" <<< "$html"
          grep -Fq "仮説を棄却する条件" <<< "$html"
          grep -Fq "data-build-sha=\"$EXPECTED_BUILD_SHA\"" <<< "$html"
          grep -Fq "data-snapshot-hash=\"$snapshot_hash\"" <<< "$html"
          profit_api_json="$(curl -fsSL "$base/api/v1/semiconductor-profit/index.json")"
          profit_api_hash="$(jq -er '.content_hash' <<< "$profit_api_json")"
          grep -Fq "data-profit-api-hash=\"$profit_api_hash\"" <<< "$html"
          demand_api_json="$(curl -fsSL "$base/api/v1/demand/index.json")"
          demand_api_hash="$(jq -er '.content_hash' <<< "$demand_api_json")"
          grep -Fq "data-demand-api-hash=\"$demand_api_hash\"" <<< "$html"
          grep -Fq "内部資金と" <<< "$html"
          printf '%s' "$html" | python3 -c 'import sys; html=sys.stdin.read(); markers=["id=\"how\"", "id=\"status\"", "id=\"demand\"", "id=\"profit\"", "id=\"companies\"", "id=\"limits\""]; positions=[html.index(marker) for marker in markers]; assert positions == sorted(positions), positions'
          model_html="$(curl -fsSL "$base/model/")"
          grep -Fq 'data-aggregation-status="computed"' <<< "$model_html"
          grep -Fq "総和と比較。" <<< "$model_html"
          grep -Fq "営業CFの総和" <<< "$model_html"
          grep -Fq "因果判定は、" <<< "$model_html"
          printf '%s' "$model_html" > "$RUNNER_TEMP/model.html"
          printf '%s' "$demand_api_json" > "$RUNNER_TEMP/demand-api.json"
          python3 - "$RUNNER_TEMP/demand-api.json" "$RUNNER_TEMP/model.html" <<'PY'
          import json
          import re
          import sys
          from collections import Counter

          api = json.loads(open(sys.argv[1], encoding="utf-8").read())
          html = open(sys.argv[2], encoding="utf-8").read()
          companies = [company for company in api["companies"] if company["quarters"]]
          periods = Counter(company["quarters"][0]["period_end"] for company in companies)
          common_period = max(periods, key=lambda period: (periods[period], period))
          common = [company for company in companies if company["quarters"][0]["period_end"] == common_period]
          total_ocf = sum(company["quarters"][0]["operating_cash_flow"]["value_usd"] for company in common)
          total_companies = len(common)
          assert re.search(rf'data-aggregation-total-ocf="{total_ocf}"', html)
          assert re.search(rf'data-aggregation-common-companies="{total_companies}"', html)
          PY
          grep -Fq "data-build-sha=\"$EXPECTED_BUILD_SHA\"" <<< "$model_html"
          grep -Fq "入力 → 式 → 中間値 → 判定" <<< "$model_html"
          grep -Fq "予測値は計算していません" <<< "$model_html"
          grep -Fq "β・ラグ・指数ウェイト" <<< "$model_html"
          printf '%s' "$model_html" | python3 -c 'import sys; html=sys.stdin.read(); markers=["id=\"inputs\"", "id=\"formula\"", "id=\"forward\"", "id=\"output\"", "id=\"verdict\""]; positions=[html.index(marker) for marker in markers]; assert positions == sorted(positions), positions'
          ! grep -Fq "MODEL VERDICT" <<< "$html"
          ! grep -Fq "30秒でわかる決算データ" <<< "$html"
          ! grep -Fqi "confidence 60%" <<< "$html"
          ! grep -Fq "Yardeni" <<< "$html"
          ! grep -Fq "β = 0.6" <<< "$html"
