name: Prove live semiconductor resilience Pages

on:
  pull_request:
    paths:
      - "scripts/audit_live_resilience.py"
      - ".github/workflows/live-resilience-proof.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: read

jobs:
  prove-live:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch audit script from the PR branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.raw+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/scripts/audit_live_resilience.py?ref=${GITHUB_HEAD_REF}" \
            -o audit_live_resilience.py
      - name: Audit deployed view and print company results
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
        run: python audit_live_resilience.py
